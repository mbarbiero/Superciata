<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SuperCIATA - Ajuste de Logradouros</title>
    <link rel="stylesheet" href="estilo.css">
    
    <style>
        /* Ajustes específicos de Layout para o Cabeçalho */
        .header-container {
            display: grid;
            grid-template-columns: 1fr 2fr 1fr; /* Coluna da esquerda, centro e direita */
            align-items: center;
            margin-bottom: 20px;
            text-align: center;
        }

        .header-center {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .header-center img {
            height: 50px;
            margin-bottom: 5px;
        }

        /* Estilos específicos para a interface de pareamento */
        .grid-ajuste {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            height: 450px;
            margin-top: 10px;
        }

        .lista-container {
            display: flex;
            flex-direction: column;
            border: 1px solid var(--border, #ddd);
            border-radius: 8px;
            background: #fff;
            overflow: hidden;
        }

        .lista-header {
            background: var(--super-dark, #003380);
            color: white;
            padding: 10px;
            font-weight: bold;
            font-size: 0.85rem;
        }

        .busca-box { padding: 8px; border-bottom: 1px solid #eee; }
        .busca-box input {
            width: 100%;
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
        }

        .lista-itens {
            flex-grow: 1;
            overflow-y: auto;
            list-style: none;
            margin: 0;
            padding: 0;
        }

        .lista-itens li {
            padding: 10px 15px;
            border-bottom: 1px solid #eee;
            cursor: pointer;
            font-size: 0.85rem;
            transition: 0.2s;
            text-align: left;
        }

        .lista-itens li:hover { background: #f8f9fa; }

        .lista-itens li.selecionado {
            background: #e3f2fd;
            border-left: 4px solid var(--super-light, #0088cc);
            font-weight: bold;
        }

        .actions {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 10px;
            margin-top: 15px;
        }

        .info-projeto {
            font-size: 0.9rem;
            font-weight: bold;
            margin: 10px 0;
            display: flex;
            justify-content: space-between;
            color: var(--super-dark, #003380);
        }
    </style>
</head>

<body>

    <div class="container" style="max-width: 1100px;">
        
        <header class="header-container">
            <div style="text-align: left;">
                <a href="index.html" class="btn-voltar" style="text-decoration: none; padding: 8px 15px;">◀ VOLTAR</a>
            </div>
            
            <div class="header-center">
                <img src="imagens/Logo SuperCIATA.png" alt="SuperCIATA Logo">
                <div class="subtitle">Espacialização de Lotes Urbanos</div>
            </div>

            <div style="visibility: hidden;"> <a class="btn-voltar">◀ VOLTAR</a>
            </div>
        </header>

        <div class="card">
            <h2>Fase 2: Ajuste de Logradouros</h2>
            
            <div class="info-projeto">
                <span id="info-municipio">📍 Município: Carregando...</span>
                <span id="status-fluxo" style="color: var(--super-light, #0088cc);">Aguardando...</span>
            </div>

            <div class="grid-ajuste">
                <div class="lista-container">
                    <div class="lista-header">PENDENTES (CIATA)</div>
                    <div class="busca-box">
                        <input type="text" id="busca-esquerda" placeholder="Filtrar ruas sem ID..."
                            onkeyup="filtrar('esquerda')">
                    </div>
                    <ul id="lista-esquerda" class="lista-itens"></ul>
                </div>

                <div class="lista-container">
                    <div class="lista-header">REFERÊNCIA (CNEFE/OSM)</div>
                    <div class="busca-box">
                        <input type="text" id="busca-direita" placeholder="Buscar correspondência..."
                            onkeyup="filtrar('direita')">
                    </div>
                    <ul id="lista-direita" class="lista-itens"></ul>
                </div>
            </div>

            <div class="actions">
                <button id="btn-vincular" class="btn btn-link" disabled onclick="vincularLogradouros()" 
                    style="background-color: #27ae60; color: white;">
                    🔗 Vincular
                </button>
                <button id="btn-desvincular" class="btn" disabled onclick="desvincularLogradouro()"
                    style="background-color: #e74c3c; color: white;">
                    🔓 Desvincular
                </button>
                <button class="btn" onclick="incluirNovoLogradouro()"
                    style="background-color: var(--super-light, #0088cc); color: white;">
                    + Novo Logradouro
                </button>
            </div>
        </div>

        <div id="console-mensagens">> Inicializando normalização de bases...</div>
    </div>

    <script>
        let projetoAtual = JSON.parse(localStorage.getItem('sc2_projeto')) || {};
        let itemEsquerda = null;
        let itemDireita = null;

        window.onload = async () => {
            if (!projetoAtual.codigo) {
                addMensagem("⚠️ Nenhum projeto ativo encontrado. Volte ao início.", "erro");
                return;
            }
            document.getElementById('info-municipio').innerText = `📍 Município: ${projetoAtual.nome}`;
            
            // Fluxos iniciais de banco de dados
            await Normaliza_CI_LOGRADOUROS(projetoAtual.codigo);
            await Atualiza_CI_LOGRADOUROS(projetoAtual.codigo);
            
            carregarDados();
        };

        async function Normaliza_CI_LOGRADOUROS(cod_municipio) {
            addMensagem("⚙️ Normalizando CI_LOGRADOUROS...");
            try {
                await fetch(`https://superciata.smuu.com.br:21079/superciata/normaliza_CI_LOGRADOUROS?cod_municipio=${encodeURIComponent(cod_municipio)}`);
                addMensagem("✅ Normalização concluída.");
            } catch (e) { addMensagem("❌ Erro na normalização", "erro"); }
        }

        async function Atualiza_CI_LOGRADOUROS(cod_municipio) {
            addMensagem("⚙️ Atualizando vínculos automáticos...");
            try {
                await fetch(`https://superciata.smuu.com.br:21079/superciata/atualiza_CI_LOGRADOUROS?cod_municipio=${encodeURIComponent(cod_municipio)}`);
                addMensagem("✅ Atualização concluída.");
            } catch (e) { addMensagem("❌ Erro na atualização", "erro"); }
        }

        async function carregarDados() {
            addMensagem(`🔍 Atualizando listas...`);

            const sqlPendentes = `SELECT DISTINCT CI_NOM_LOGRADOURO_NORM FROM CI_LOGRADOUROS WHERE COD_MUNICIPIO = '${projetoAtual.codigo}' AND (SC_ID_LOGRADOURO IS NULL OR SC_ID_LOGRADOURO = '') ORDER BY CI_NOM_LOGRADOURO_NORM`;
            const sqlReferencia = `SELECT DISTINCT NOM_LOGRADOURO FROM CN_LOGRADOUROS WHERE COD_MUNICIPIO = '${projetoAtual.codigo}' ORDER BY NOM_LOGRADOURO`;

            const pendentes = await buscarSQL(sqlPendentes);
            const referencia = await buscarSQL(sqlReferencia);

            popularLista('lista-esquerda', pendentes, 'CI_NOM_LOGRADOURO_NORM');
            popularLista('lista-direita', referencia, 'NOM_LOGRADOURO');
        }

        async function buscarSQL(sql) {
            try {
                const res = await fetch('https://superciata.smuu.com.br:21079/sc2_/executa_sql', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ tipo: 'direto', sql: sql })
                });
                const result = await res.json();
                return result.sucesso ? (result.dados || []) : [];
            } catch (err) { return []; }
        }

        function popularLista(id, dados, campo) {
            const ul = document.getElementById(id);
            ul.innerHTML = '';
            if (dados.length === 0 && id === 'lista-esquerda') {
                ul.innerHTML = '<li style="color: #27ae60; text-align: center; font-weight: bold;">Concluído! ✅</li>';
                return;
            }
            dados.forEach(d => {
                const li = document.createElement('li');
                li.innerText = d[campo];
                li.onclick = () => selecionar(id, li);
                ul.appendChild(li);
            });
        }

        function selecionar(idLista, elemento) {
            document.querySelectorAll(`#${idLista} li`).forEach(i => i.classList.remove('selecionado'));
            elemento.classList.add('selecionado');

            if (idLista === 'lista-esquerda') itemEsquerda = elemento.innerText;
            if (idLista === 'lista-direita') itemDireita = elemento.innerText;

            document.getElementById('btn-vincular').disabled = !(itemEsquerda && itemDireita);
        }

        async function vincularLogradouros() {
            if (!confirm(`Vincular "${itemEsquerda}" a "${itemDireita}"?`)) return;

            addMensagem(`🔗 Gravando vínculo...`);
            const sqlUpdate = `
                UPDATE CI_LOGRADOUROS 
                SET SC_ID_LOGRADOURO = (SELECT SC_ID_LOGRADOURO FROM CN_LOGRADOUROS WHERE NOM_LOGRADOURO = '${itemDireita}' LIMIT 1)
                WHERE CI_NOM_LOGRADOURO_NORM = '${itemEsquerda}' AND COD_MUNICIPIO = '${projetoAtual.codigo}'`;

            await buscarSQL(sqlUpdate);
            await Atualiza_CI_LOGRADOUROS(projetoAtual.codigo);
            
            addMensagem(`✅ Vínculo processado.`, "ok");
            itemEsquerda = itemDireita = null;
            carregarDados();
        }

        async function incluirNovoLogradouro() {
            const novoNome = prompt("Nome do logradouro:");
            if (!novoNome) return;
            const nomeNorm = novoNome.toUpperCase().normalize('NFD').replace(/[\u0300-\u036f]/g, "").trim();
            const sqlInsert = `INSERT INTO CI_LOGRADOUROS (COD_MUNICIPIO, CI_NOM_LOGRADOURO, CI_NOM_LOGRADOURO_NORM) VALUES ('${projetoAtual.codigo}', '${novoNome.toUpperCase()}', '${nomeNorm}')`;
            await buscarSQL(sqlInsert);
            await Normaliza_CI_LOGRADOUROS(projetoAtual.codigo);
            carregarDados();
        }

        function filtrar(lado) {
            const filter = document.getElementById(`busca-${lado}`).value.toUpperCase();
            const li = document.getElementById(`lista-${lado}`).getElementsByTagName('li');
            for (let i = 0; i < li.length; i++) {
                let txt = li[i].textContent || li[i].innerText;
                li[i].style.display = txt.toUpperCase().indexOf(filter) > -1 ? "" : "none";
            }
        }

        function addMensagem(texto, tipo) {
            const consoleEl = document.getElementById("console-mensagens");
            const div = document.createElement("div");
            div.style.color = tipo === "erro" ? "#ff5555" : tipo === "ok" ? "#55ff55" : "#0f0";
            div.innerText = `> ${texto}`;
            consoleEl.appendChild(div);
            consoleEl.scrollTop = consoleEl.scrollHeight;
        }
    </script>
</body>
</html>
