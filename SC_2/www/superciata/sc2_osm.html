<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>SuperCIATA - Coletor Otimizado</title>
    <style>
        :root { --bg: #f8f9fa; --primary: #2c3e50; --success: #27ae60; --danger: #e74c3c; --terminal: #1e1e1e; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); padding: 20px; }
        .container { max-width: 850px; margin: auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .header { border-bottom: 3px solid #3498db; margin-bottom: 20px; }
        .btn { width: 48%; padding: 15px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 1rem; }
        .btn-start { background: var(--success); color: white; }
        .btn-stop { background: var(--danger); color: white; }
        button:disabled { background: #ccc; cursor: not-allowed; }
        .monitor { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin: 20px 0; }
        .card { border: 1px solid #ddd; padding: 15px; border-radius: 8px; background: #fff; }
        .card h4 { margin: 0 0 10px 0; color: #666; font-size: 0.8rem; text-transform: uppercase; }
        .terminal { background: var(--terminal); color: #00ff00; padding: 15px; border-radius: 8px; font-family: 'Consolas', monospace; height: 250px; overflow-y: auto; font-size: 0.85rem; line-height: 1.5; }
        .log-match { color: #f1c40f; font-weight: bold; }
        .log-info { color: #5dade2; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h2>SuperCIATA - Coleta Slim (Capanema)</h2>
        <p>Estratégia: Gravação apenas de nomes e IDs (Sem JSON pesado).</p>
    </div>

    <div style="display:flex; justify-content: space-between;">
        <button id="btn-start" class="btn btn-start" onclick="motor(true)">🚀 Iniciar Coleta</button>
        <button id="btn-stop" class="btn btn-stop" onclick="motor(false)" disabled>⏹️ Parar</button>
    </div>

    <div class="monitor">
        <div class="card">
            <h4>📍 Face Municipal</h4>
            <div id="view-cn">Pronto...</div>
        </div>
        <div class="card">
            <h4>🌍 Resultado OSM</h4>
            <div id="view-osm">Pronto...</div>
        </div>
    </div>

    <div id="terminal" class="terminal">> Aguardando comando...</div>
</div>

<script>
    const API_SQL = 'https://superciata.smuu.com.br:21079/sc2_/executa_sql';
    const COD_MUN = "4104501";
    let rodando = false;
    let faceAtual = null;

    const sleep = (ms) => new Promise(r => setTimeout(r, ms));

    function log(msg, classe = '') {
        const t = document.getElementById('terminal');
        const time = new Date().toLocaleTimeString();
        t.innerHTML += `<div class="${classe}">[${time}] ${msg}</div>`;
        t.scrollTop = t.scrollHeight;
    }

    async function querySQL(sql) {
        try {
            const res = await fetch(API_SQL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ tipo: 'direto', sql: sql })
            });
            const text = await res.text();
            return JSON.parse(text);
        } catch (e) {
            console.error("Erro SQL:", e);
            return { sucesso: false, erro: e.message };
        }
    }

    async function buscarPendente() {
        const sql = `
            SELECT f.SC_ID_LOGRADOURO, f.NOM_LOGRADOURO, 
            ROUND(ST_X(f.CENTROIDE), 8) as lon, ROUND(ST_Y(f.CENTROIDE), 8) as lat 
            FROM CN_FACES f
            LEFT JOIN OSM_CONSULTAS o ON f.SC_ID_LOGRADOURO = o.SC_ID_LOGRADOURO
            WHERE (o.SC_ID_LOGRADOURO IS NULL 
                OR o.OSM_NOM_LOGRADOURO = 'NÃO ENCONTRADO'
            )
            AND f.COD_MUNICIPIO = '${COD_MUN}'
            ORDER BY f.QTD_PONTOS DESC LIMIT 1`;
        const data = await querySQL(sql);
        return (data.sucesso && data.dados.length > 0) ? data.dados[0] : null;
    }

    async function salvar(face, nomeOSM, idOSM) {
        // Grava apenas os campos necessários. O campo RESPOSTA_OSM_JSON agora leva apenas o ID do OSM para referência.
        const sql = `
            INSERT INTO OSM_CONSULTAS (SC_ID_LOGRADOURO, CN_NOM_LOGRADOURO, OSM_NOM_LOGRADOURO, COD_MUNICIPIO, RESPOSTA_OSM_JSON)
            VALUES (
                '${face.SC_ID_LOGRADOURO}', 
                '${face.NOM_LOGRADOURO.replace(/'/g, "''")}', 
                '${nomeOSM.replace(/'/g, "''")}', 
                '${COD_MUN}', 
                '${idOSM || "NULL"}' 
            )
            ON DUPLICATE KEY UPDATE 
                OSM_NOM_LOGRADOURO = VALUES(OSM_NOM_LOGRADOURO),
                RESPOSTA_OSM_JSON = VALUES(RESPOSTA_OSM_JSON),
                DATA_CONSULTA = CURRENT_TIMESTAMP`;
        return await querySQL(sql);
    }

    function motor(status) {
        rodando = status;
        document.getElementById('btn-start').disabled = status;
        document.getElementById('btn-stop').disabled = !status;
        if (status) iniciar();
    }

    async function iniciar() {
        log("Motor iniciado...", "log-info");
        while (rodando) {
            if (!faceAtual) faceAtual = await buscarPendente();
            if (!faceAtual) { log("🏁 Fim do lote."); break; }

            document.getElementById('view-cn').innerHTML = `<b>${faceAtual.SC_ID_LOGRADOURO}</b><br>${faceAtual.NOM_LOGRADOURO}`;
            
            try {
                const url = `https://overpass-api.de/api/interpreter?data=[out:json];way(around:10,${faceAtual.lat},${faceAtual.lon})["highway"];out tags;`;
                const resOSM = await fetch(url);

                if (resOSM.status === 429 || resOSM.status === 529) {
                    log("🛑 Rate Limit/Servidor Ocupado. Pausa de 2 min.", "log-match");
                    await sleep(120000); continue;
                }

                const dataOSM = await resOSM.json();
                const via = dataOSM.elements?.find(e => e.tags && e.tags.name);
                const nomeOSM = via ? via.tags.name : "NÃO ENCONTRADO";
                const idOSM = via ? via.id : null;

                document.getElementById('view-osm').innerHTML = `<b>OSM:</b> ${nomeOSM}`;

                const save = await salvar(faceAtual, nomeOSM, idOSM);
                if (save.sucesso) {
                    const statusMsg = nomeOSM !== "NÃO ENCONTRADO" ? `✨ ENCONTRADO: ${nomeOSM}` : `⚪ Sem dados no OSM`;
                    log(statusMsg, nomeOSM !== "NÃO ENCONTRADO" ? 'log-match' : '');
                    faceAtual = null; // Próximo
                    
                    const pausa = Math.floor(Math.random() * (40000 - 20000) + 20000);
                    log(`😴 Espera: ${pausa/1000}s...`);
                    await sleep(pausa);
                }
            } catch (err) {
                log(`❌ Erro Rede: ${err.message}. Tentando mesma face em 30s...`);
                await sleep(30000);
            }
            if (!rodando) break;
        }
        motor(false);
    }
</script>

</body>
</html>
