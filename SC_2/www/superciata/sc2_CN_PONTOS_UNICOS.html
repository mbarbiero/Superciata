<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Camada: CN_PONTOS_UNICOS</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body, html, #map { height: 100%; margin: 0; padding: 0; background: #f8f9fa; }
        
        .loading-notice {
            position: absolute; top: 10px; right: 10px; z-index: 1000;
            background: white; padding: 5px 10px; border-radius: 4px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2); font-family: sans-serif; font-size: 12px;
        }

        /* Modal de Aviso Centralizado */
        #aviso-vazio {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 2000;
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            text-align: center;
            font-family: 'Segoe UI', system-ui, sans-serif;
            display: none; /* Escondido por padrão */
            min-width: 300px;
            border-top: 5px solid #e74c3c;
        }

        #aviso-vazio h3 { color: #e74c3c; margin-top: 0; }
        #aviso-vazio p { color: #555; font-size: 0.9rem; line-height: 1.5; }
        #aviso-vazio .btn-entendido {
            margin-top: 15px;
            padding: 8px 20px;
            background: #f1f3f5;
            border: 1px solid #ced4da;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div id="loading" class="loading-notice" style="display:none;">⏳ Consultando banco de dados...</div>

    <div id="aviso-vazio">
        <h3>📍 Sem Dados Encontrados</h3>
        <p id="msg-erro">Não existem pontos georreferenciados para este município na tabela <b>CN_PONTOS_UNICOS</b>.</p>
        <button class="btn-entendido" onclick="document.getElementById('aviso-vazio').style.display='none'">Fechar</button>
    </div>

    <div id="map"></div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        let codMunicipio = urlParams.get('cod_municipio');
        
        if (!codMunicipio) {
            const projeto = JSON.parse(localStorage.getItem('sc2_projeto'));
            if (projeto) codMunicipio = projeto.codigo;
        }

        // Camadas
        const osm = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution: '© OSM' });
        const satelite = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', { attribution: 'Esri' });

        const map = L.map('map', { center: [-15.78, -47.93], zoom: 4, layers: [osm] });
        const camadaPontos = L.layerGroup().addTo(map);

        L.control.layers({ "Mapa": osm, "Satélite": satelite }, { "Pontos": camadaPontos }, { collapsed: false }).addTo(map);

        async function carregarDados() {
            if (!codMunicipio) return;
            
            const loading = document.getElementById('loading');
            const aviso = document.getElementById('aviso-vazio');
            
            loading.style.display = 'block';
            aviso.style.display = 'none';

            try {
                const response = await fetch(`https://superciata.smuu.com.br:21079/superciata/retorna_CN_PONTOS_UNICOS?cod_municipio=${codMunicipio}`);
                
                if (!response.ok) throw new Error("Erro na comunicação com o servidor.");
                
                const dados = await response.json();

                // Verificação de retorno vazio
                if (!dados || dados.length === 0) {
                    aviso.style.display = 'block';
                    return;
                }

                const bounds = [];
                dados.forEach(ponto => {
                    if (ponto.COORDS) {
                        const coordsStr = ponto.COORDS.replace('POINT(', '').replace(')', '').split(' ');
                        const lng = parseFloat(coordsStr[0]);
                        const lat = parseFloat(coordsStr[1]);

                        if (!isNaN(lat) && !isNaN(lng)) {
                            const marker = L.circleMarker([lat, lng], {
                                radius: 4,
                                fillColor: "#0088cc",
                                color: "#003380",
                                weight: 1,
                                fillOpacity: 0.7
                            }).bindPopup(`<b>${ponto.NOM_LOGRADOURO}</b><br>Nº: ${ponto.NUM_ENDERECO || 'S/N'}`);
                            
                            marker.addTo(camadaPontos);
                            bounds.push([lat, lng]);
                        }
                    }
                });

                if (bounds.length > 0) {
                    map.fitBounds(bounds, { padding: [30, 30] });
                } else {
                    aviso.style.display = 'block';
                }

            } catch (err) {
                console.error(err);
                document.getElementById('msg-erro').innerText = "Houve uma falha ao tentar conectar com a API ou o banco de dados.";
                aviso.style.display = 'block';
            } finally {
                loading.style.display = 'none';
            }
        }

        carregarDados();
    </script>
</body>
</html>
