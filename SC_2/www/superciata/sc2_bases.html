<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SuperCIATA - Importação e Validação</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <link rel="stylesheet" href="estilo.css">
    <style>
        /* Ajustes específicos para remover ícones e focar no conteúdo */
        .upload-controls {
            display: flex;
            flex-direction: column;
            gap: 10px;
            width: 100%;
            margin-top: 15px;
        }

        .report {
            margin: 10px 0;
            padding: 12px;
            border-radius: 6px;
            background: #f8f9fa;
            border: 1px solid var(--border);
            display: none;
            text-align: left;
            font-size: 0.75rem;
            line-height: 1.4;
        }

        .report.valid { border-left: 4px solid #27ae60; background: #ebfbee; }
        .report.invalid { border-left: 4px solid #e74c3c; background: #fff5f5; }

        .btn-action {
            padding: 10px;
            border-radius: 6px;
            border: none;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            font-size: 0.75rem;
            transition: 0.2s;
        }

        .btn-load { background: var(--super-light); color: white; }
        .btn-proc { background: #f39c12; color: white; }
        
        .btn-action:disabled { background: #ccc; cursor: not-allowed; transform: none !important; }

        /* Ajuste do menu-item para remover o espaço do ícone */
        .menu-item.vertical {
            cursor: default;
            transform: none !important;
            box-shadow: none !important;
            padding: 20px;
            display: block; /* Remove o flex para alinhamento simples */
        }

        .menu-item h3 {
            border-bottom: 2px solid var(--border);
            padding-bottom: 8px;
            margin-bottom: 12px;
        }
    </style>
</head>

<body>

    <div class="container">
        <div class="top-bar">
            <a href="index.html" class="btn-voltar">◀ VOLTAR</a>
        </div>

        <div class="header-logo">
            <img src="imagens/Logo SuperCIATA.png" alt="SuperCIATA Logo">
        </div>
        
        <div class="subtitle">Espacialização de Lotes Urbanos</div>

        <div class="card" style="border-top-color: var(--super-light);">
            <h2>Projeto Selecionado</h2>
            <div id="projeto-info" style="font-size: 0.9rem; font-weight: 600; color: var(--super-dark);">
                Aguardando município...
            </div>
        </div>

        <div class="grid-menu">
            
            <div class="menu-item vertical">
                <div class="menu-content">
                    <h3>Base CNEFE (IBGE)</h3>
                    <label style="font-size: 0.7rem; margin-bottom: 5px; display: block;">Selecione o arquivo .ZIP:</label>
                    <input type="file" id="input-cnefe" accept=".zip">
                    
                    <div id="report-cnefe" class="report"></div>
                    
                    <div class="upload-controls">
                        <button id="btn-load-cnefe" class="btn-action btn-load" onclick="fluxoIntegrado('cnefe')">Validar e Enviar</button>
                        <button id="btn-proc-cnefe" class="btn-action btn-proc" onclick="processarBase('cnefe')">Processar no Banco</button>
                    </div>
                </div>
            </div>

            <div class="menu-item vertical">
                <div class="menu-content">
                    <h3>Base CTU / CIATA</h3>
                    <label style="font-size: 0.7rem; margin-bottom: 5px; display: block;">Selecione o arquivo .ZIP:</label>
                    <input type="file" id="input-ciata" accept=".zip">
                    
                    <div id="report-ciata" class="report"></div>
                    
                    <div class="upload-controls">
                        <button id="btn-load-ciata" class="btn-action btn-load" onclick="fluxoIntegrado('ciata')">Validar e Enviar</button>
                        <button id="btn-proc-ciata" class="btn-action btn-proc" onclick="processarBase('ciata')">Processar no Banco</button>
                    </div>
                </div>
            </div>

        </div>

        <div id="console-mensagens">
            > Pronto para processamento.
        </div>
    </div>

    <script>
        let projetoAtual = { codigo: null, nome: null, uf: null };
        const REQUISITOS = {
            cnefe: ["COD_UNICO_ENDERECO", "COD_UF", "COD_MUNICIPIO", "COD_DISTRITO", "COD_SUBDISTRITO", "COD_SETOR"],
            ciata: ["COD_MUNICIPIO", "COD_UNICO_ENDERECO", "ID_QUADRA", "NOM_LOGRADOURO"]
        };

        window.onload = () => {
            const salvo = localStorage.getItem('sc2_projeto');
            if (salvo) {
                projetoAtual = JSON.parse(salvo);
                document.getElementById('projeto-info').innerText = `${projetoAtual.nome} (${projetoAtual.uf}) - Município: ${projetoAtual.codigo}`;
                addMensagem(`Projeto: ${projetoAtual.nome}`, "ok");
            }
        };

        async function fluxoIntegrado(tipo) {
            const input = document.getElementById(`input-${tipo}`);
            const report = document.getElementById(`report-${tipo}`);
            const arquivoZip = input.files[0];

            if (!projetoAtual.codigo) { addMensagem("⚠️ Erro: Selecione o município na Home.", "erro"); return; }
            if (!arquivoZip) { addMensagem(`⚠️ Selecione o arquivo ZIP.`, "erro"); return; }

            try {
                bloquearBotoes(true);
                addMensagem(`Analisando ${tipo.toUpperCase()}...`, "info");

                const zip = await JSZip.loadAsync(arquivoZip);
                const arquivosNoZip = Object.values(zip.files).filter(f => !f.dir);
                if (arquivosNoZip.length !== 1) throw new Error("O ZIP deve conter apenas 1 arquivo CSV.");

                const csvEntry = arquivosNoZip[0];
                const conteudo = await csvEntry.async("string");
                const linhas = conteudo.split(/\r?\n/).filter(l => l.trim() !== "");
                const cabecalho = linhas[0].split(/[;,]/).map(c => c.trim().toUpperCase());
                
                const faltantes = REQUISITOS[tipo].filter(c => !cabecalho.includes(c));
                if (faltantes.length > 0) throw new Error(`Colunas ausentes: ${faltantes.join(", ")}`);

                const idxMun = cabecalho.indexOf("COD_MUNICIPIO");
                const codigoNoCSV = linhas[1].split(/[;,]/)[idxMun]?.trim();
                if (codigoNoCSV !== projetoAtual.codigo) throw new Error("O município no CSV não coincide com o projeto.");

                // Simulação de Upload (Conforme sua URL)
                const formData = new FormData();
                formData.append("arqZip", arquivoZip);
                formData.append("tipo", tipo);
                formData.append("nome_csv", csvEntry.name);
                formData.append("municipio_cod", projetoAtual.codigo);

                const res = await fetch('https://superciata.smuu.com.br:21079/superciata/carrega_arqZip', { method: "POST", body: formData });
                const result = await res.json();
                if (!result.sucesso) throw new Error(result.mensagem);

                report.className = "report valid";
                report.style.display = "block";
                report.innerHTML = `<b>✔ VALIDADO</b><br>Arquivo: ${csvEntry.name}<br>Linhas: ${linhas.length - 1}`;
                addMensagem(`${tipo.toUpperCase()} enviado com sucesso.`, "ok");
                
                registrarNoBanco(tipo, linhas.length - 1);

            } catch (e) {
                addMensagem(`Erro: ${e.message}`, "erro");
                report.className = "report invalid";
                report.style.display = "block";
                report.innerHTML = `<b>✖ ERRO</b><br>${e.message}`;
            } finally {
                bloquearBotoes(false);
            }
        }

        async function processarBase(dominio) {
            bloquearBotoes(true);
            addMensagem(`Iniciando Scripts SQL para ${dominio}...`, "info");
            
            const script = dominio === 'cnefe' ? 'CN_PreencheTabelas.sql' : 'CI_LOGRADOUROS_Preenche.sql';
            
            try {
                const res = await fetch('https://superciata.smuu.com.br:21079/sc2_/executa_sql', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ tipo: 'arquivo', arquivo: script, parametros: { 'cod_municipio': projetoAtual.codigo } })
                });
                const result = await res.json();
                if (result.sucesso) addMensagem(`Processamento concluído.`, "ok");
            } catch (err) { addMensagem(`Erro SQL: ${err.message}`, "erro"); }
            
            bloquearBotoes(false);
        }

        async function registrarNoBanco(tipo, total) {
            const sql = `INSERT INTO SC_LOG (COD_MUNICIPIO, TP_ARQUIVO, QT_REGISTROS, DT_IMPORTACAO) VALUES ('${projetoAtual.codigo}', '${tipo.toUpperCase()}', ${total}, NOW());`;
            fetch('https://superciata.smuu.com.br:21079/sc2_/executa_sql', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ tipo: 'direto', sql })
            });
        }

        function addMensagem(texto, tipo) {
            const consoleEl = document.getElementById("console-mensagens");
            const div = document.createElement("div");
            div.style.color = tipo === "erro" ? "#ff8787" : tipo === "ok" ? "#b3ffb3" : "#0f0";
            div.innerText = `> ${texto}`;
            consoleEl.appendChild(div);
            consoleEl.scrollTop = consoleEl.scrollHeight;
        }

        function bloquearBotoes(status) {
            const ids = ["btn-load-cnefe", "btn-proc-cnefe", "btn-load-ciata", "btn-proc-ciata"];
            ids.forEach(id => { if(document.getElementById(id)) document.getElementById(id).disabled = status; });
        }
    </script>
</body>
</html>
