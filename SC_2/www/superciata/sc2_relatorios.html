<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SuperCIATA - Relatórios</title>
    <link rel="stylesheet" href="estilo.css">
    
    <style>
        /* Ajustes de Layout para o Cabeçalho */
        .header-container {
            display: grid;
            grid-template-columns: 1fr 2fr 1fr;
            align-items: center;
            margin-bottom: 20px;
            text-align: center;
        }

        .header-center {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .header-center img {
            height: 50px;
            margin-bottom: 5px;
        }

        /* Estilos para a seleção de relatórios */
        .grid-relatorios {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            margin-top: 10px;
        }

        .card-relatorio {
            background: white;
            padding: 30px 25px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            text-decoration: none;
            color: inherit;
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: transform 0.2s, box-shadow 0.2s;
            border-top: 5px solid var(--super-light, #0088cc);
            text-align: center;
        }

        .card-relatorio:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.15);
            background-color: #fcfdfe;
        }

        .icon-relatorio {
            font-size: 3.5rem;
            margin-bottom: 15px;
        }

        .card-relatorio h3 {
            color: var(--super-dark, #003380);
            margin: 10px 0;
            text-transform: uppercase;
            font-size: 1.1rem;
        }

        .card-relatorio p {
            font-size: 0.9rem;
            color: #666;
            line-height: 1.5;
            margin: 0;
        }

        .info-projeto {
            font-size: 0.95rem;
            font-weight: bold;
            margin: 10px 0 20px 0;
            text-align: center;
            color: var(--super-dark, #003380);
            background: #fff;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid var(--border, #ddd);
        }
    </style>
</head>

<body>

    <div class="container" style="max-width: 1000px;">
        
        <header class="header-container">
            <div style="text-align: left;">
                <a href="index.html" class="btn-voltar" style="text-decoration: none; padding: 8px 15px;">◀ VOLTAR</a>
            </div>
            
            <div class="header-center">
                <img src="imagens/Logo SuperCIATA.png" alt="SuperCIATA Logo">
                <div class="subtitle">Espacialização de Lotes Urbanos</div>
            </div>

            <div style="visibility: hidden;">
                <a class="btn-voltar">◀ VOLTAR</a>
            </div>
        </header>

        <div class="info-projeto" id="display-municipio">
            📍 Selecione um município no painel de controle
        </div>

        <div class="grid-relatorios">
            
            <a href="#" class="card-relatorio" onclick="abrirRelatorio('resumo_bases')">
                <div class="icon-relatorio">📊</div>
                <h3>Resumo Bases Importadas</h3>
                <p>Estatísticas de importação e integridade dos dados por fonte.</p>
            </a>

            <a href="#" class="card-relatorio" onclick="abrirRelatorio('logradouros')">
                <div class="icon-relatorio">🛣️</div>
                <h3>Logradouros</h3>
                <p>Relatório de pareamento, ruas confirmadas e pendências de ID.</p>
            </a>

        </div>
    </div>

    <script>
        const projetoAtual = JSON.parse(localStorage.getItem('sc2_projeto'));

        window.onload = () => {
            if (projetoAtual && projetoAtual.nome) {
                document.getElementById('display-municipio').innerText = `📍 Município Ativo: ${projetoAtual.nome} (${projetoAtual.codigo})`;
            }
        };

        function abrirRelatorio(tipo) {
            if (!projetoAtual) {
                alert("Por favor, selecione um município no Painel de Controle antes de acessar os relatórios.");
                return;
            }

            // Redireciona para o arquivo de relatório correspondente passando o código do município
            window.location.href = `sc2_relatorio_${tipo}.html?cod_municipio=${projetoAtual.codigo}`;
        }
    </script>
</body>
</html>
